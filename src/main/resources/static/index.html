<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务管理控制台</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">SM</div>
            <div>
                <strong>服务管理</strong>
                <span>Server Manage</span>
            </div>
        </div>
        <nav class="nav">
            <button class="nav-item active" data-view="services">服务</button>
            <button class="nav-item" data-view="packages">包版本</button>
            <button class="nav-item" data-view="configs">配置项</button>
            <button class="nav-item" data-view="logs">日志</button>
            <button class="nav-item" data-view="global">公共配置</button>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <p class="eyebrow">Console</p>
                <h1 id="pageTitle">服务</h1>
            </div>
            <div class="top-actions">
                <button class="icon-button" id="refreshBtn" title="刷新">↻</button>
                <button class="primary-button" id="newServiceBtn">新建服务</button>
            </div>
        </header>

        <section class="summary-grid">
            <div class="metric">
                <span>服务总数</span>
                <strong id="totalServices">0</strong>
            </div>
            <div class="metric">
                <span>运行中</span>
                <strong id="runningServices">0</strong>
            </div>
            <div class="metric">
                <span>Jar 包</span>
                <strong id="totalPackages">0</strong>
            </div>
            <div class="metric">
                <span>当前服务</span>
                <strong id="activeServiceName">-</strong>
            </div>
        </section>

        <section class="content-grid">
            <div class="panel service-panel">
                <div class="panel-title">
                    <h2>服务列表</h2>
                    <span id="serviceCount">0 项</span>
                </div>
                <div class="service-list" id="serviceList"></div>
            </div>

            <div class="workspace">
                <section class="view active" id="view-services">
                    <div class="panel">
                        <div class="panel-title">
                            <h2>服务信息</h2>
                            <span id="runtimeBadge" class="status-badge muted">STOPPED</span>
                        </div>
                        <form class="form-grid" id="serviceForm">
                            <input type="hidden" id="serviceId">
                            <label>
                                服务名称
                                <input id="serviceName" required placeholder="order-service">
                            </label>
                            <label>
                                端口
                                <input id="port" required type="number" min="1" max="65535" placeholder="8080">
                            </label>
                            <label>
                                内存限制
                                <input id="memoryLimit" placeholder="512m">
                            </label>
                            <label>
                                数据库名称
                                <input id="databaseName" placeholder="order_db">
                            </label>
                            <label class="wide">
                                描述
                                <textarea id="description" rows="3" placeholder="服务用途、负责人或部署说明"></textarea>
                            </label>
                            <div class="form-actions wide">
                                <button type="submit" class="primary-button">保存服务</button>
                                <button type="button" class="ghost-button" id="resetServiceBtn">清空</button>
                                <button type="button" class="danger-button" id="deleteServiceBtn">删除</button>
                            </div>
                        </form>
                    </div>

                    <div class="panel">
                        <div class="panel-title">
                            <h2>运行控制</h2>
                            <span id="commandStatus">命令待生成</span>
                        </div>
                        <div class="control-row">
                            <button class="success-button" id="startBtn">启动</button>
                            <button class="ghost-button" id="restartBtn">重启</button>
                            <button class="danger-button" id="stopBtn">关闭</button>
                        </div>
                        <pre class="command-box" id="commandBox">选择服务并启动后显示命令</pre>
                    </div>
                </section>

                <section class="view" id="view-packages">
                    <div class="panel">
                        <div class="panel-title">
                            <h2>包版本管理</h2>
                            <span id="packageCount">0 项</span>
                        </div>
                        <form class="upload-row" id="packageForm">
                            <input id="packageVersion" placeholder="版本号，例如 1.0.0" required>
                            <input id="packageFile" type="file" accept=".jar" required>
                            <button class="primary-button" type="submit">上传 Jar</button>
                        </form>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                <tr>
                                    <th>文件</th>
                                    <th>版本</th>
                                    <th>大小</th>
                                    <th>SHA-256</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                                </thead>
                                <tbody id="packageTable"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section class="view" id="view-configs">
                    <div class="panel">
                        <div class="panel-title">
                            <h2>服务配置项</h2>
                            <span id="configCount">0 项</span>
                        </div>
                        <form class="form-grid" id="configForm">
                            <input type="hidden" id="configId">
                            <label>
                                名称
                                <input id="configName" placeholder="Redis 地址" required>
                            </label>
                            <label>
                                参数路径
                                <input id="parameterPath" placeholder="spring.redis.host" required>
                            </label>
                            <label class="wide">
                                值
                                <input id="configValue" placeholder="127.0.0.1">
                            </label>
                            <div class="form-actions wide">
                                <button class="primary-button" type="submit">保存配置</button>
                                <button class="ghost-button" type="button" id="resetConfigBtn">清空</button>
                            </div>
                        </form>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>参数路径</th>
                                    <th>值</th>
                                    <th>操作</th>
                                </tr>
                                </thead>
                                <tbody id="configTable"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section class="view" id="view-logs">
                    <div class="panel">
                        <div class="panel-title">
                            <h2>日志</h2>
                            <select id="logSelect"></select>
                        </div>
                        <div class="control-row">
                            <button class="ghost-button" id="loadLogBtn">实时输出</button>
                            <a class="ghost-link" id="downloadLogLink" href="#">下载日志</a>
                        </div>
                        <pre class="log-box" id="logBox">暂无日志</pre>
                    </div>
                </section>

                <section class="view" id="view-global">
                    <div class="panel">
                        <div class="panel-title">
                            <h2>公共配置</h2>
                            <span>数据库地址与中间件地址</span>
                        </div>
                        <form class="form-grid" id="globalForm">
                            <label>
                                数据库地址
                                <input id="databaseAddress" placeholder="jdbc:mysql://127.0.0.1:3306">
                            </label>
                            <label>
                                中间件地址
                                <input id="middlewareAddress" placeholder="127.0.0.1:6379">
                            </label>
                            <div class="form-actions wide">
                                <button class="primary-button" type="submit">保存公共配置</button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </section>
    </main>
</div>

<div class="toast" id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
